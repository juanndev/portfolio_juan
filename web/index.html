<!DOCTYPE html>
<html>
  <head>
    <!--
      If you are serving your web app in a path other than the root, change the
      href value below to reflect the base path you are serving from.

      The path provided below has to start and end with a slash "/" in order for
      it to work correctly.

      For more details:
      * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

      This is a placeholder for base href that will be replaced by the value of
      the `--base-href` argument provided to `flutter build`.
    -->
    <base href="$FLUTTER_BASE_HREF">

    <meta property="og:title" content="Juan Mota | Desenvolvedor Mobile & Front-end">
    <meta property="og:description" content="Engenheiro de Software com foco em Flutter, UI/UX e AppSec. Veja meus projetos mais recentes.">
    <meta property="og:image" content="https://portfolio-juan-cyan.vercel.app/assets/assets/images/perfil.jpg">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="A new Flutter project.">

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="portfolio_juan">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png"/>

    <title>portfolio_juan</title>
    <link rel="manifest" href="manifest.json">
  </head>
  <body style="background-color: #03120A; margin: 0;">

    <div id="loading-container" style="display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; z-index: 9999; background-color: #03120A;">
      <style>
        .loader {
          width: 48px;
          height: 48px;
          border: 5px solid rgba(46, 204, 113, 0.2);
          border-bottom-color: #2ECC71;
          border-radius: 50%;
          display: inline-block;
          box-sizing: border-box;
          animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
      <span class="loader"></span>
    </div>

    <script>
      window.addEventListener('flutter-first-frame', function() {
        var loading = document.getElementById('loading-container');
        if (loading) {
          loading.style.transition = 'opacity 0.4s ease-out';
          loading.style.opacity = '0';
          setTimeout(function() {
            loading.remove();
          }, 400);
        }
      });
    </script>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
